* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e17; color: #e0e0e0; overflow: hidden; }
#container { display: flex; height: 100vh; width: 100vw; }
#cy { flex: 1; min-width: 0; }
#panel { width: 420px; min-width: 420px; max-height: 100vh; background: #111827; border-left: 1px solid #1f2937; overflow-y: auto; padding: 20px; display: none; }
#panel.open { display: flex; flex-direction: column; }
#panel h2 { font-size: 18px; color: #f9fafb; margin-bottom: 4px; }
#panel .node-type { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
#panel .summary { font-size: 14px; line-height: 1.6; color: #d1d5db; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #1f2937; }
#panel .section-title { font-size: 13px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
#panel .price-box { background: #1f2937; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
#panel .price-main { font-size: 24px; font-weight: 700; color: #f9fafb; }
#panel .price-deltas { display: flex; gap: 12px; margin-top: 6px; font-size: 13px; }
#panel .delta { padding: 2px 6px; border-radius: 4px; }
#panel .delta.up { background: rgba(239,68,68,0.15); color: #f87171; }
#panel .delta.down { background: rgba(34,197,94,0.15); color: #4ade80; }
.signal { background: #1f2937; border-radius: 6px; padding: 10px; margin-bottom: 8px; font-size: 13px; line-height: 1.5; }
.signal .date { color: #6b7280; font-size: 11px; margin-bottom: 2px; }
.signal .content { color: #d1d5db; }
.signal .sources { color: #6b7280; font-size: 11px; margin-top: 4px; }
.signal.high { border-left: 3px solid #f87171; }
.signal.medium { border-left: 3px solid #fbbf24; }
.signal.low { border-left: 3px solid #6b7280; }
.edge-item { background: #1f2937; border-radius: 6px; padding: 10px; margin-bottom: 6px; font-size: 13px; cursor: pointer; }
.edge-item:hover { background: #374151; }
.edge-item .edge-to { color: #60a5fa; font-weight: 600; }
.edge-item .edge-type { color: #6b7280; font-size: 11px; }
.edge-item .edge-context { color: #9ca3af; font-size: 12px; margin-top: 4px; line-height: 1.4; }
.edge-item .edge-weight { float: right; font-size: 11px; color: #9ca3af; }
.trigger { background: #1c1917; border: 1px solid #78350f; border-radius: 6px; padding: 10px; margin-bottom: 8px; font-size: 13px; }
.trigger .condition { color: #fbbf24; font-weight: 600; margin-bottom: 4px; }
.trigger .mechanism { color: #d1d5db; line-height: 1.4; }
.trigger .status { color: #6b7280; font-size: 11px; margin-top: 4px; }
#header { position: absolute; top: 16px; left: 16px; z-index: 10; }
#header h1 { font-size: 20px; color: #f9fafb; font-weight: 700; }
#header .stats { font-size: 12px; color: #6b7280; margin-top: 2px; }
#legend { position: absolute; bottom: 16px; left: 16px; z-index: 10; background: rgba(17,24,39,0.9); padding: 12px; border-radius: 8px; font-size: 12px; }
#legend .item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
#legend .dot { width: 12px; height: 12px; border-radius: 50%; }
#close-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #6b7280; font-size: 20px; cursor: pointer; padding: 4px 8px; }
#close-btn:hover { color: #f9fafb; }
#search { position: absolute; top: 16px; right: 16px; z-index: 10; }
#search input { background: #1f2937; border: 1px solid #374151; color: #f9fafb; padding: 8px 12px; border-radius: 6px; font-size: 14px; width: 220px; }
#search input::placeholder { color: #6b7280; }
</style>

    {
      selector: 'edge',
      style: {
        'width': 'data(width)',
        'line-color': '#374151',
        'curve-style': 'bezier',
        'opacity': 0.4
      }
    },
    {
      selector: 'node:selected',
      style: {
        'border-width': 3,
        'border-color': '#f9fafb',
        'border-opacity': 1
      }
    },
    {
      selector: '.highlighted',
      style: {
        'opacity': 1,
        'line-color': '#60a5fa',
        'z-index': 10
      }
    },
    {
      selector: '.dimmed',
      style: {
        'opacity': 0.1
      }
    },
    {
      selector: '.neighbor',
      style: {
        'opacity': 1,
        'border-width': 2,
        'border-color': '#60a5fa'
      }
    }
  ],
  layout: {
    name: 'cose',
    randomize: false,
    animate: false,
    nodeDimensionsIncludeLabels: true,
    nodeRepulsion: function(node) { return 8000; },
    idealEdgeLength: function(edge) { return 120; },
    edgeElasticity: function(edge) { return 100; },
    gravity: 0.3,
    numIter: 2000,
    initialTemp: 200,
    coolingFactor: 0.95,
    minTemp: 1.0
  },
  minZoom: 0.3,
  maxZoom: 3,
  wheelSensitivity: 0.3
});

// Stats
document.getElementById('graph-stats').textContent =
  `${GRAPH_DATA.meta.total_nodes} nodes | ${GRAPH_DATA.meta.total_edges} edges | Updated ${GRAPH_DATA.meta.last_updated}`;

// Click handler
cy.on('tap', 'node', function(evt) {
  const node = evt.target;
  const data = node.data('nodeData');
  console.log('Node clicked:', data.name, 'Panel element:', document.getElementById('panel'));

  // Highlight neighbors
  cy.elements().removeClass('highlighted dimmed neighbor');
  cy.elements().addClass('dimmed');
  node.removeClass('dimmed');
  node.connectedEdges().removeClass('dimmed').addClass('highlighted');
  node.neighborhood('node').removeClass('dimmed').addClass('neighbor');

  // Open panel
  const panel = document.getElementById('panel');
  try {
  panel.classList.add('open');

  let html = `<h2>${data.name}</h2>`;
  html += `<div class="node-type">${data.type} · Layer ${node.data('layer')} · ${node.data('connections')} connections</div>`;
  html += `<div class="summary">${data.summary}</div>`;

  // Price data
  if (data.current) {
    html += `<div class="price-box">`;
    html += `<div class="price-main">${data.current.price}</div>`;
    html += `<div class="price-deltas">`;
    ['delta_1d', 'delta_1m', 'delta_3m'].forEach(k => {
      if (data.current[k]) {
        const val = data.current[k];
        const cls = val.includes('+') ? 'up' : 'down';
        const label = k.replace('delta_', '');
        html += `<span class="delta ${cls}">${label}: ${val}</span>`;
      }
    });
    html += `</div></div>`;
  }

  // Connections
  if (data.edges && data.edges.length > 0) {
    html += `<div class="section-title">Connections (${data.edges.length})</div>`;
    data.edges.sort((a, b) => b.weight - a.weight).forEach(edge => {
      const targetNode = GRAPH_DATA.nodes[edge.to];
      const targetName = targetNode ? targetNode.name : edge.to;
      html += `<div class="edge-item" onclick="focusNode('${edge.to}')">`;
      html += `<span class="edge-weight">${edge.weight.toFixed(1)}</span>`;
      html += `<div class="edge-to">${targetName}</div>`;
      html += `<div class="edge-type">${edge.type.replace(/_/g, ' ')}</div>`;
      html += `<div class="edge-context">${edge.context}</div>`;
      html += `</div>`;
    });
  }

  // Trigger points
  if (data.trigger_points && data.trigger_points.length > 0) {
    html += `<div class="section-title">Trigger Points</div>`;
    data.trigger_points.forEach(tp => {
      html += `<div class="trigger">`;
      html += `<div class="condition">${tp.condition}</div>`;
      html += `<div class="mechanism">${tp.mechanism}</div>`;
      html += `<div class="status">Status: ${tp.status} · Added: ${tp.added}</div>`;
      html += `</div>`;
    });
  }

  // Signals (latest 5)
  if (data.signals && data.signals.length > 0) {
    html += `<div class="section-title">Recent Signals (${data.signals.length})</div>`;
    data.signals.slice(-5).reverse().forEach(sig => {
      html += `<div class="signal ${sig.significance}">`;
      html += `<div class="date">${sig.date}</div>`;
      html += `<div class="content">${sig.content}</div>`;
      html += `<div class="sources">Sources: ${sig.sources.join(', ')}</div>`;
      html += `</div>`;
    });
  }

  document.getElementById('panel-content').innerHTML = html;
  console.log('Panel opened for:', data.name, 'Panel visible:', panel.classList.contains('open'));
  } catch(err) { console.error('Panel error:', err); }
});

// Background click - reset
cy.on('tap', function(evt) {
  if (evt.target === cy) {
    cy.elements().removeClass('highlighted dimmed neighbor');
    document.getElementById('panel').classList.remove('open');
  }
});

// Close button
document.getElementById('close-btn').addEventListener('click', () => {
  cy.elements().removeClass('highlighted dimmed neighbor');
  document.getElementById('panel').classList.remove('open');
});

// Focus on a node (used by edge click)
function focusNode(nodeId) {
  const node = cy.getElementById(nodeId);
  if (node.length) {
    cy.animate({ center: { eles: node }, zoom: 1.5 }, { duration: 300 });
    node.emit('tap');
  }
}

// Search
document.getElementById('search-input').addEventListener('input', function(e) {
  const query = e.target.value.toLowerCase();
  if (query.length === 0) {
    cy.elements().removeClass('dimmed');
    return;
  }
  cy.nodes().forEach(node => {
    if (node.data('label').toLowerCase().includes(query)) {
      node.removeClass('dimmed');
    } else {
      node.addClass('dimmed');
    }
  });
});
</script>
</body>
</html>
